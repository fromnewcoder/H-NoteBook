version: "3.9"

services:
  db:
    image: postgres:14.22-trixie
    environment:
      POSTGRES_DB: hnb
      POSTGRES_USER: hnb
      POSTGRES_PASSWORD: secret
    ports: ["5432:5432"]
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  chroma:
    image: chromadb/chroma:latest
    ports: ["8001:8000"]
    volumes:
      - chroma_data:/app/chroma_data

  backend:
    build: ./backend
    env_file: .env
    ports: ["8000:8000"]
    depends_on:
      - db
      - redis
      - chroma
    volumes:
      - ./backend:/app
      - chroma_data:/app/chroma_data
      - export_data:/app/exports

  worker:
    build: ./backend
    command: celery -A app.workers.celery_app worker --loglevel=info
    env_file: .env
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
      - chroma_data:/app/chroma_data
      - export_data:/app/exports

  frontend:
    build: ./frontend
    ports: ["5173:5173"]
    depends_on:
      - backend

volumes:
  pg_data:
  chroma_data:
  export_data:
